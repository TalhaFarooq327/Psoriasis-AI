name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags, preventing shallow clone errors on push
          lfs: true # Automatically download the large .keras model file from Git LFS during build

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force push the main branch to Hugging Face Spaces.
          git push --force https://ZohaibandSaeed:$HF_TOKEN@huggingface.co/spaces/ZohaibandSaeed/BackendPsoriasisAI main
