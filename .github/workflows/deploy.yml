name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags, preventing shallow clone errors on push
          lfs: true # Automatically download the large .keras model file from Git LFS during build

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 1. Create a clean temporary deployment directory
          mkdir -p ../hf-deploy
          
          # 2. Copy only backend files (excluding frontend and root assets)
          cp -r Backend/fyp_api/* ../hf-deploy/
          
          # 3. Go to temp directory and initialize a fresh Git repository
          cd ../hf-deploy
          git init -b main
          
          # 4. Configure Git LFS to track the model file
          git lfs install
          git lfs track "*.keras"
          
          # 5. Stage and commit only backend files
          git add .gitattributes
          git add .
          git commit -m "Deploy backend only"
          
          # 6. Force push directly to Hugging Face Spaces
          git push --force https://ZohaibandSaeed:$HF_TOKEN@huggingface.co/spaces/ZohaibandSaeed/BackendPsoriasisAI main
